<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsHub</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="main-nav">
  <div class="logo">📰 NewsHub</div>

  <div class="nav-links">
    <button class="nav-link active">Home</button>
    <button class="nav-link">Cities</button>
    <button class="nav-link">Categories</button>
    <button class="nav-link">Bookmarks</button>
  </div>

  <div class="nav-right">
    <button id="dark-toggle">🌙</button>

    <div class="search-box">
      <input id="search-text" placeholder="Search...">
      <button id="search-button">Go</button>
    </div>
  </div>
</nav>

<!-- CITY BAR (SCROLLABLE) -->
<div class="city-bar">
  <button class="city-pill active" data-query="Delhi">Delhi</button>
  <button class="city-pill" data-query="Mumbai">Mumbai</button>
  <button class="city-pill" data-query="Bangalore">Bangalore</button>
  <button class="city-pill" data-query="London">London</button>
  <button class="city-pill" data-query="New York">New York</button>
  <button class="city-pill" data-query="Tokyo">Tokyo</button>
  <button class="city-pill" data-query="Dubai">Dubai</button>
</div>

<!-- NEWS -->
<main id="cardscontainer"></main>

<template id="template-news-card">
  <div class="card">
    <img id="news-img">
    <div class="card-body">
      <h3 id="news-title"></h3>
      <p id="news-desc"></p>
    </div>
  </div>
</template>

<script src="script.js"></script>
</body>
</html>
